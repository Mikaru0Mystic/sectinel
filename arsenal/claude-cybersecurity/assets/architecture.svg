<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bgA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/><stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3fb950"/>
    </marker>
  </defs>
  <rect width="800" height="400" rx="12" fill="url(#bgA)"/>

  <!-- Phase 1: GATHER -->
  <rect x="40" y="30" width="720" height="65" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="60" y="52" font-family="monospace" font-size="13" font-weight="700" fill="#3fb950">PHASE 1: GATHER</text>
  <text x="60" y="74" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">Detect stack | Enumerate entry points | Map trust boundaries | STRIDE analysis | Build context</text>
  <text x="700" y="67" font-family="monospace" font-size="22" fill="#3fb950" text-anchor="middle">&#x1F50D;</text>

  <!-- Arrow -->
  <line x1="400" y1="95" x2="400" y2="120" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 2: ANALYZE -->
  <rect x="40" y="125" width="720" height="130" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="60" y="147" font-family="monospace" font-size="13" font-weight="700" fill="#58a6ff">PHASE 2: ANALYZE — 8 Agents in Parallel</text>
  <!-- Agent boxes -->
  <g transform="translate(55, 158)">
    <rect x="0" y="0" width="78" height="32" rx="4" fill="#f8514920" stroke="#f85149" stroke-width="1"/><text x="39" y="14" font-family="monospace" font-size="8" fill="#f85149" text-anchor="middle">Vuln</text><text x="39" y="25" font-family="monospace" font-size="7" fill="#8b949e" text-anchor="middle">20%</text>
    <rect x="88" y="0" width="78" height="32" rx="4" fill="#f0883e20" stroke="#f0883e" stroke-width="1"/><text x="127" y="14" font-family="monospace" font-size="8" fill="#f0883e" text-anchor="middle">Auth</text><text x="127" y="25" font-family="monospace" font-size="7" fill="#8b949e" text-anchor="middle">15%</text>
    <rect x="176" y="0" width="78" height="32" rx="4" fill="#a371f720" stroke="#a371f7" stroke-width="1"/><text x="215" y="14" font-family="monospace" font-size="8" fill="#a371f7" text-anchor="middle">Threat</text><text x="215" y="25" font-family="monospace" font-size="7" fill="#8b949e" text-anchor="middle">15%</text>
    <rect x="264" y="0" width="78" height="32" rx="4" fill="#3fb95020" stroke="#3fb950" stroke-width="1"/><text x="303" y="14" font-family="monospace" font-size="8" fill="#3fb950" text-anchor="middle">Secrets</text><text x="303" y="25" font-family="monospace" font-size="7" fill="#8b949e" text-anchor="middle">10%</text>
    <rect x="352" y="0" width="78" height="32" rx="4" fill="#58a6ff20" stroke="#58a6ff" stroke-width="1"/><text x="391" y="14" font-family="monospace" font-size="8" fill="#58a6ff" text-anchor="middle">Deps</text><text x="391" y="25" font-family="monospace" font-size="7" fill="#8b949e" text-anchor="middle">10%</text>
    <rect x="440" y="0" width="78" height="32" rx="4" fill="#d2992220" stroke="#d29922" stroke-width="1"/><text x="479" y="14" font-family="monospace" font-size="8" fill="#d29922" text-anchor="middle">IaC</text><text x="479" y="25" font-family="monospace" font-size="7" fill="#8b949e" text-anchor="middle">10%</text>
    <rect x="528" y="0" width="78" height="32" rx="4" fill="#79c0ff20" stroke="#79c0ff" stroke-width="1"/><text x="567" y="14" font-family="monospace" font-size="8" fill="#79c0ff" text-anchor="middle">AI Code</text><text x="567" y="25" font-family="monospace" font-size="7" fill="#8b949e" text-anchor="middle">10%</text>
    <rect x="616" y="0" width="78" height="32" rx="4" fill="#bc8cff20" stroke="#bc8cff" stroke-width="1"/><text x="655" y="14" font-family="monospace" font-size="8" fill="#bc8cff" text-anchor="middle">Logic</text><text x="655" y="25" font-family="monospace" font-size="7" fill="#8b949e" text-anchor="middle">10%</text>
  </g>
  <text x="60" y="240" font-family="system-ui,sans-serif" font-size="10" fill="#6e7681">Each agent loads its own reference files | Returns VULN-XXX findings + category score (0-100) + confidence levels</text>

  <!-- Arrow -->
  <line x1="400" y1="255" x2="400" y2="275" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 3: RECOMMEND -->
  <rect x="40" y="280" width="345" height="55" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="60" y="302" font-family="monospace" font-size="13" font-weight="700" fill="#f0883e">PHASE 3: RECOMMEND</text>
  <text x="60" y="322" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">Score aggregation | Attack-path chaining | Compliance</text>

  <!-- Arrow between 3 and 4 -->
  <line x1="385" y1="307" x2="410" y2="307" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 4: EXECUTE -->
  <rect x="415" y="280" width="345" height="55" rx="8" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
  <text x="435" y="302" font-family="monospace" font-size="13" font-weight="700" fill="#f85149">PHASE 4: EXECUTE</text>
  <text x="435" y="322" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">Structured report | Prioritized remediation queue</text>

  <!-- Bottom labels -->
  <text x="400" y="365" font-family="monospace" font-size="11" fill="#3fb950" text-anchor="middle">/cybersecurity [path] [--scope full|quick|diff] [--compliance pci|hipaa|soc2|gdpr]</text>
  <text x="400" y="385" font-family="system-ui,sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">Zero configuration | Auto-detects languages and frameworks | Framework-aware FP suppression</text>
</svg>
