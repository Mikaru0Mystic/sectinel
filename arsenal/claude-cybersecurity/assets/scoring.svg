<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bgS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/><stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="12" fill="url(#bgS)"/>

  <!-- Grade bar -->
  <text x="400" y="28" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#e6edf3" text-anchor="middle">Security Score — 0 to 100</text>

  <!-- Score bar background -->
  <rect x="40" y="45" width="720" height="40" rx="6" fill="#161b22"/>

  <!-- F zone -->
  <rect x="40" y="45" width="173" height="40" rx="6" fill="#f8514930"/>
  <text x="126" y="70" font-family="monospace" font-size="18" font-weight="700" fill="#f85149" text-anchor="middle">F</text>

  <!-- D zone -->
  <rect x="213" y="45" width="173" height="40" fill="#f0883e30"/>
  <text x="300" y="70" font-family="monospace" font-size="18" font-weight="700" fill="#f0883e" text-anchor="middle">D</text>

  <!-- C zone -->
  <rect x="386" y="45" width="180" height="40" fill="#d2992230"/>
  <text x="476" y="70" font-family="monospace" font-size="18" font-weight="700" fill="#d29922" text-anchor="middle">C</text>

  <!-- B zone -->
  <rect x="566" y="45" width="108" height="40" fill="#58a6ff30"/>
  <text x="620" y="70" font-family="monospace" font-size="18" font-weight="700" fill="#58a6ff" text-anchor="middle">B</text>

  <!-- A zone -->
  <rect x="674" y="45" width="86" height="40" rx="6" fill="#3fb95030"/>
  <text x="717" y="70" font-family="monospace" font-size="18" font-weight="700" fill="#3fb950" text-anchor="middle">A</text>

  <!-- Scale markers -->
  <text x="40" y="102" font-family="monospace" font-size="9" fill="#6e7681">0</text>
  <text x="210" y="102" font-family="monospace" font-size="9" fill="#6e7681">25</text>
  <text x="383" y="102" font-family="monospace" font-size="9" fill="#6e7681">50</text>
  <text x="563" y="102" font-family="monospace" font-size="9" fill="#6e7681">75</text>
  <text x="671" y="102" font-family="monospace" font-size="9" fill="#6e7681">90</text>
  <text x="745" y="102" font-family="monospace" font-size="9" fill="#6e7681">100</text>

  <!-- Formula -->
  <rect x="40" y="115" width="720" height="42" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="137" font-family="monospace" font-size="11" fill="#e6edf3" text-anchor="middle">Score = Base Severity (CVSS) x Confidence (0.3-1.0) x Exploitability (0.5-1.0) +/- Context (-20 to +20)</text>
  <text x="400" y="152" font-family="system-ui,sans-serif" font-size="9" fill="#6e7681" text-anchor="middle">4-tier confidence: HIGH (90-100%) | MEDIUM (60-89%) | LOW (30-59%) | INFO (&lt;30%)</text>

  <!-- Severity labels at bottom -->
  <g transform="translate(40, 168)">
    <rect x="0" y="0" width="10" height="10" rx="2" fill="#f85149"/><text x="14" y="9" font-family="monospace" font-size="9" fill="#f85149">CRITICAL 90-100</text>
    <rect x="140" y="0" width="10" height="10" rx="2" fill="#f0883e"/><text x="154" y="9" font-family="monospace" font-size="9" fill="#f0883e">HIGH 70-89</text>
    <rect x="260" y="0" width="10" height="10" rx="2" fill="#d29922"/><text x="274" y="9" font-family="monospace" font-size="9" fill="#d29922">MEDIUM 40-69</text>
    <rect x="390" y="0" width="10" height="10" rx="2" fill="#58a6ff"/><text x="404" y="9" font-family="monospace" font-size="9" fill="#58a6ff">LOW 20-39</text>
    <rect x="490" y="0" width="10" height="10" rx="2" fill="#8b949e"/><text x="504" y="9" font-family="monospace" font-size="9" fill="#8b949e">INFO 0-19</text>
  </g>
</svg>
