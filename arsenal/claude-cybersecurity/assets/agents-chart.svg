<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/><stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
  </defs>
  <rect width="800" height="320" rx="12" fill="url(#bg1)"/>
  <text x="400" y="32" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#e6edf3" text-anchor="middle">8 Specialist Agents — Parallel Execution</text>
  <!-- Agent bars -->
  <g transform="translate(30, 52)">
    <!-- Vuln Scanner 20% -->
    <rect x="0" y="0" width="740" height="28" rx="4" fill="#161b22"/>
    <rect x="0" y="0" width="148" height="28" rx="4" fill="#f85149" opacity="0.9"/>
    <text x="8" y="18" font-family="monospace" font-size="11" fill="white" font-weight="600">Vulnerability Scanner</text>
    <text x="155" y="18" font-family="monospace" font-size="11" fill="#8b949e">20% — OWASP Top 10 + CWE Top 25, taint analysis</text>
    <!-- Auth 15% -->
    <rect x="0" y="33" width="740" height="28" rx="4" fill="#161b22"/>
    <rect x="0" y="33" width="111" height="28" rx="4" fill="#f0883e" opacity="0.9"/>
    <text x="8" y="51" font-family="monospace" font-size="11" fill="white" font-weight="600">Auth Reviewer</text>
    <text x="118" y="51" font-family="monospace" font-size="11" fill="#8b949e">15% — IDOR, privilege escalation, session management</text>
    <!-- Threat Intel 15% -->
    <rect x="0" y="66" width="740" height="28" rx="4" fill="#161b22"/>
    <rect x="0" y="66" width="111" height="28" rx="4" fill="#a371f7" opacity="0.9"/>
    <text x="8" y="84" font-family="monospace" font-size="11" fill="white" font-weight="600">Threat Intel</text>
    <text x="118" y="84" font-family="monospace" font-size="11" fill="#8b949e">15% — Malware, backdoors, C2 comm, MITRE ATT&amp;CK</text>
    <!-- Secret 10% -->
    <rect x="0" y="99" width="740" height="28" rx="4" fill="#161b22"/>
    <rect x="0" y="99" width="74" height="28" rx="4" fill="#3fb950" opacity="0.9"/>
    <text x="8" y="117" font-family="monospace" font-size="11" fill="white" font-weight="600">Secrets</text>
    <text x="81" y="117" font-family="monospace" font-size="11" fill="#8b949e">10% — Semantic detection, obfuscated credentials</text>
    <!-- Deps 10% -->
    <rect x="0" y="132" width="740" height="28" rx="4" fill="#161b22"/>
    <rect x="0" y="132" width="74" height="28" rx="4" fill="#58a6ff" opacity="0.9"/>
    <text x="8" y="150" font-family="monospace" font-size="11" fill="white" font-weight="600">Deps</text>
    <text x="81" y="150" font-family="monospace" font-size="11" fill="#8b949e">10% — Supply chain, slopsquatting, typosquatting</text>
    <!-- IaC 10% -->
    <rect x="0" y="165" width="740" height="28" rx="4" fill="#161b22"/>
    <rect x="0" y="165" width="74" height="28" rx="4" fill="#d29922" opacity="0.9"/>
    <text x="8" y="183" font-family="monospace" font-size="11" fill="white" font-weight="600">IaC</text>
    <text x="81" y="183" font-family="monospace" font-size="11" fill="#8b949e">10% — Terraform, Docker, K8s, GitHub Actions</text>
    <!-- AI Code 10% -->
    <rect x="0" y="198" width="740" height="28" rx="4" fill="#161b22"/>
    <rect x="0" y="198" width="74" height="28" rx="4" fill="#79c0ff" opacity="0.9"/>
    <text x="8" y="216" font-family="monospace" font-size="11" fill="white" font-weight="600">AI Code</text>
    <text x="81" y="216" font-family="monospace" font-size="11" fill="#8b949e">10% — AI-generated patterns, hallucinated deps</text>
    <!-- Logic 10% -->
    <rect x="0" y="231" width="740" height="28" rx="4" fill="#161b22"/>
    <rect x="0" y="231" width="74" height="28" rx="4" fill="#bc8cff" opacity="0.9"/>
    <text x="8" y="249" font-family="monospace" font-size="11" fill="white" font-weight="600">Logic</text>
    <text x="81" y="249" font-family="monospace" font-size="11" fill="#8b949e">10% — Business logic, race conditions, TOCTOU</text>
  </g>
</svg>
